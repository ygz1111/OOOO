# ============================================================================
# Grafana 仪表盘自动配置
# ============================================================================

apiVersion: 1

providers:
  - name: "智能电网预测系统"
    orgId: 1
    folder: "Grid Predict"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: true
