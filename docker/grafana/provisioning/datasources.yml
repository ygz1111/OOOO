# ============================================================================
# Grafana 数据源自动配置
# ============================================================================

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: "POST"

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: grid_predict
    user: griduser
    secureJsonData:
      password: gridpass123
    jsonData:
      sslmode: "disable"
      postgresVersion: 1600
      timescaledb: true
