# ============================================================================
# Prometheus 配置 - 智能电网负荷预测系统
# ============================================================================

global:
  scrape_interval: 15s          # 采集间隔
  evaluation_interval: 15s      # 规则评估间隔
  scrape_timeout: 10s           # 采集超时

# 告警规则
rule_files:
  - "alerts.yml"

# 采集目标
scrape_configs:
  # ==========================================================================
  # API Gateway 指标
  # ==========================================================================
  - job_name: "api-gateway"
    metrics_path: /metrics
    static_configs:
      - targets: ["api-gateway:8000"]
        labels:
          service: "api-gateway"

  # ==========================================================================
  # 模型推理服务指标
  # ==========================================================================
  - job_name: "model-inference"
    metrics_path: /metrics
    static_configs:
      - targets: ["model-inference:8500"]
        labels:
          service: "model-inference"

  # ==========================================================================
  # 特征工程服务指标
  # ==========================================================================
  - job_name: "feature-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["feature-engine:8600"]
        labels:
          service: "feature-engine"

  # ==========================================================================
  # 气象采集服务指标
  # ==========================================================================
  - job_name: "weather-collector"
    metrics_path: /metrics
    static_configs:
      - targets: ["weather-collector:9090"]
        labels:
          service: "weather-collector"

  # ==========================================================================
  # 监控服务自身
  # ==========================================================================
  - job_name: "monitoring"
    metrics_path: /metrics
    static_configs:
      - targets: ["monitoring:9095"]
        labels:
          service: "monitoring"

# ============================================================================
# 告警规则
# ============================================================================
