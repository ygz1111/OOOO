# ============================================================================
# 智能电网负荷预测系统 - Docker Compose
# ============================================================================
# 6个服务:
#   1. postgres     - 时序数据库
#   2. redis         - 缓存
#   3. weather-collector - 气象采集
#   4. feature-engine    - 特征工程
#   5. model-inference   - 模型推理
#   6. api-gateway        - API 网关
# ============================================================================

version: "3.8"

services:
  # ==========================================================================
  # 1. PostgreSQL 时序数据库
  # ==========================================================================
  postgres:
    image: timescale/timescaledb:2.13.1-pg16
    container_name: grid-predict-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-grid_predict}
      POSTGRES_USER: ${POSTGRES_USER:-griduser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-gridpass123}
      TS_TUNE_MEMORY: ${POSTGRES_MEMORY:-256MB}
      TS_TUNE_NUM_CPUS: 2
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-griduser} -d ${POSTGRES_DB:-grid_predict}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "2"
        reservations:
          memory: 256M

  # ==========================================================================
  # 2. Redis 缓存
  # ==========================================================================
  redis:
    image: redis:7-alpine
    container_name: grid-predict-redis
    restart: unless-stopped
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-redis123}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 128M

  # ==========================================================================
  # 3. 气象数据采集服务
  # ==========================================================================
  weather-collector:
    build:
      context: ..
      dockerfile: docker/services/weather-collector/Dockerfile
    container_name: grid-predict-weather
    restart: unless-stopped
    environment:
      - COLLECT_INTERVAL=300
      - PAST_DAYS=7
      - FORECAST_DAYS=2
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-grid_predict}
      - POSTGRES_USER=${POSTGRES_USER:-griduser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-gridpass123}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - LOG_LEVEL=INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9090:9090"
    volumes:
      - weather_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

  # ==========================================================================
  # 4. 特征工程服务
  # ==========================================================================
  feature-engine:
    build:
      context: ..
      dockerfile: docker/services/feature-engine/Dockerfile
    container_name: grid-predict-feature
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8600:8600"
    volumes:
      - feature_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8600/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # ==========================================================================
  # 5. 模型推理服务
  # ==========================================================================
  model-inference:
    build:
      context: ..
      dockerfile: docker/services/model-inference/Dockerfile
    container_name: grid-predict-inference
    restart: unless-stopped
    environment:
      - MODEL_DIR=/app/outputs
      - DEVICE=cpu
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - LOG_LEVEL=INFO
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8500:8500"
    volumes:
      - inference_logs:/app/logs
      - ../../outputs:/app/outputs:ro
      - ../../processed:/app/processed:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8500/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "4"
        reservations:
          memory: 1G

  # ==========================================================================
  # 6. API Gateway (FastAPI)
  # ==========================================================================
  api-gateway:
    build:
      context: ..
      dockerfile: docker/services/api-gateway/Dockerfile
    container_name: grid-predict-gateway
    restart: unless-stopped
    environment:
      - WEATHER_SERVICE_URL=http://weather-collector:9090
      - FEATURE_SERVICE_URL=http://feature-engine:8600
      - INFERENCE_SERVICE_URL=http://model-inference:8500
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis123}
      - LOG_LEVEL=INFO
      - WORKERS=2
    depends_on:
      weather-collector:
        condition: service_healthy
      feature-engine:
        condition: service_healthy
      model-inference:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - gateway_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/system/status"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - grid-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

# ============================================================================
# 数据卷
# ============================================================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  weather_logs:
    driver: local
  feature_logs:
    driver: local
  inference_logs:
    driver: local
  gateway_logs:
    driver: local

# ============================================================================
# 网络
# ============================================================================
networks:
  grid-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
